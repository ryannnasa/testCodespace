<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Administration du site</title>
</head>
<body>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    (function () {
      var tokenPattern = /(?:invite_token|recovery_token|confirmation_token)=/;
      var hash = window.location.hash || '';

      function hasTokenInSearch() {
        return tokenPattern.test(window.location.search || '');
      }

      function hasTokenInHash() {
        return tokenPattern.test(window.location.hash || '');
      }

      // Netlify Identity consomme surtout les tokens en hash (#...)
      if (hasTokenInSearch() && !hasTokenInHash()) {
        var normalizedHash = (window.location.search || '').replace(/^\?/, '#');
        window.location.replace('/admin/' + normalizedHash);
        return;
      }

      var hasIdentityToken = hasTokenInHash();

      function getIdentityModeFromHash() {
        if (/invite_token=/.test(hash)) return 'signup';
        if (/recovery_token=/.test(hash)) return 'recovery';
        if (/confirmation_token=/.test(hash)) return null;
        return null;
      }

      function loadCms() {
        if (window.__decapCmsLoaded) return;
        window.__decapCmsLoaded = true;

        var script = document.createElement('script');
        script.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
        document.body.appendChild(script);
      }

      function initializeApp() {
        if (window.netlifyIdentity) {
          window.netlifyIdentity.on('init', function (user) {
            if (!user) {
              window.netlifyIdentity.open();
            }
            loadCms();
          });

          window.netlifyIdentity.on('login', function () {
            window.location.href = '/admin/';
          });

          window.netlifyIdentity.on('logout', function () {
            window.location.href = '/admin/';
          });

          window.netlifyIdentity.init();
        } else {
          loadCms();
        }
      }

      // Attendre que le DOM soit prêt et que netlify-identity-widget soit chargé
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initializeApp);
      } else {
        initializeApp();
      }

      // Fallback si netlifyIdentity n'est pas disponible après 2 secondes
      setTimeout(function () {
        if (!window.__decapCmsLoaded && !window.netlifyIdentity) {
          loadCms();
        }
      }, 2000);
    })();
  </script>
</body>
</html>
