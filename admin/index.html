<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Administration du site</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script>
    (function () {
      // Vérifier si on a un token d'invitation/recovery dans le hash
      var hasInviteToken = /#invite_token=/.test(window.location.hash);
      var hasRecoveryToken = /#recovery_token=/.test(window.location.hash);
      
      function loadCms() {
        if (window.__decapCmsLoaded) return;
        window.__decapCmsLoaded = true;

        var script = document.createElement('script');
        script.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
        document.body.appendChild(script);
      }

      function initializeNetlifyIdentity() {
        if (!window.netlifyIdentity) {
          loadCms();
          return;
        }

        // Événement d'initialisation
        window.netlifyIdentity.on('init', function (user) {
          if (!user) {
            // Pas d'utilisateur connecté
            if (hasInviteToken) {
              // Mode d'invitation - le widget doit permettre de créer un mot de passe
              window.netlifyIdentity.open('signup');
            } else if (hasRecoveryToken) {
              // Mode de récupération de mot de passe
              window.netlifyIdentity.open('recovery');
            } else {
              // Connexion normale
              window.netlifyIdentity.open('login');
            }
          } else {
            // Utilisateur déjà connecté, charger le CMS
            loadCms();
          }
        });

        // Événement de connexion
        window.netlifyIdentity.on('login', function (user) {
          loadCms();
        });

        // Événement de déconnexion
        window.netlifyIdentity.on('logout', function () {
          window.location.href = '/admin/';
        });

        // Initialiser Netlify Identity
        window.netlifyIdentity.init();
      }

      // Initialiser quand le DOM est prêt
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initializeNetlifyIdentity);
      } else {
        initializeNetlifyIdentity();
      }

      // Timeout fallback
      setTimeout(function () {
        if (!window.__decapCmsLoaded && !window.netlifyIdentity) {
          loadCms();
        }
      }, 5000);
    })();
  </script>
</body>
</html>
