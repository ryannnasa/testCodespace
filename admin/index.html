<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Administration du site</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <style>
    html, body {
      min-height: 100%;
      margin: 0;
      background: #f7f4ef;
      color: #2f2a25;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    #admin-status {
      max-width: 28rem;
      padding: 1.5rem 1.75rem;
      border-radius: 1rem;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 12px 40px rgba(47, 42, 37, 0.12);
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="admin-status" role="status" aria-live="polite">
    Chargement de l’administration…
  </div>
  <script>
    (function () {
      var statusElement = document.getElementById('admin-status');
      var hasInviteToken = /(?:^|[#&])invite_token=/.test(window.location.hash);
      var hasRecoveryToken = /(?:^|[#&])recovery_token=/.test(window.location.hash);

      function setStatus(message) {
        if (statusElement) {
          statusElement.textContent = message;
        }
      }

      function openAuthWidget() {
        // Attendre que le widget soit disponible
        if (!window.netlifyIdentity) {
          setTimeout(openAuthWidget, 100);
          return;
        }
        
        if (hasInviteToken) {
          window.netlifyIdentity.open('signup');
        } else if (hasRecoveryToken) {
          window.netlifyIdentity.open('recovery');
        }
      }

      function initializeNetlifyIdentity() {
        // Attendre que window.netlifyIdentity soit disponible
        var retries = 0;
        var maxRetries = 50; // 5 secondes max
        
        function checkAndInit() {
          if (!window.netlifyIdentity) {
            if (retries < maxRetries) {
              retries++;
              setTimeout(checkAndInit, 100);
            } else {
              console.error('Netlify Identity widget failed to load');
              setStatus('Impossible de charger l’authentification. Rechargez la page ou réessayez plus tard.');
            }
            return;
          }

          // Le widget est maintenant disponible
          window.netlifyIdentity.on('init', function (user) {
            if (hasInviteToken) {
              setStatus('Ouverture de la création de mot de passe…');
              openAuthWidget();
            } else if (hasRecoveryToken) {
              setStatus('Ouverture de la récupération de mot de passe…');
              openAuthWidget();
            } else {
              if (!user) {
                setStatus('Ouverture de la connexion…');
                window.netlifyIdentity.open('login');
              } else {
                setStatus('Chargement de l’administration…');
              }
            }
          });

          window.netlifyIdentity.on('login', function (user) {
            window.location.href = '/admin/';
          });

          window.netlifyIdentity.on('logout', function () {
            window.location.href = '/admin/';
          });

          // Initialiser Netlify Identity
          window.netlifyIdentity.init();
        }

        checkAndInit();
      }

      // Initialiser quand le DOM est prêt
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initializeNetlifyIdentity);
      } else {
        initializeNetlifyIdentity();
      }
    })();
  </script>
</body>
</html>
