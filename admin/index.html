<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Administration du site</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script>
    (function () {
      // Vérifier si on a un token d'invitation/recovery dans le hash
      var hasInviteToken = /#invite_token=/.test(window.location.hash);
      var hasRecoveryToken = /#recovery_token=/.test(window.location.hash);
      var isAuthFlow = hasInviteToken || hasRecoveryToken;
      
      function loadCms() {
        if (window.__decapCmsLoaded) return;
        window.__decapCmsLoaded = true;

        var script = document.createElement('script');
        script.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
        document.body.appendChild(script);
      }

      function initializeNetlifyIdentity() {
        if (!window.netlifyIdentity) {
          loadCms();
          return;
        }

        // Événement d'initialisation
        window.netlifyIdentity.on('init', function (user) {
          // Si on a un token d'invitation ou recovery, toujours ouvrir le widget approprié
          if (isAuthFlow) {
            // Nettoyer la session actuelle pour forcer le formulaire d'invitation
            if (user) {
              window.netlifyIdentity.logout();
            }
            // Ouvrir le widget en mode approprié
            setTimeout(function() {
              if (hasInviteToken) {
                window.netlifyIdentity.open('signup');
              } else if (hasRecoveryToken) {
                window.netlifyIdentity.open('recovery');
              }
            }, 100);
          } else {
            // Pas de token - flux normal
            if (!user) {
              window.netlifyIdentity.open('login');
            } else {
              loadCms();
            }
          }
        });

        // Événement de connexion
        window.netlifyIdentity.on('login', function (user) {
          loadCms();
        });

        // Événement de déconnexion
        window.netlifyIdentity.on('logout', function () {
          // Si on est dans un flux d'invitation, rouvrir le widget après logout
          if (isAuthFlow) {
            setTimeout(function() {
              if (hasInviteToken) {
                window.netlifyIdentity.open('signup');
              } else if (hasRecoveryToken) {
                window.netlifyIdentity.open('recovery');
              }
            }, 100);
          } else {
            window.location.href = '/admin/';
          }
        });

        // Initialiser Netlify Identity
        window.netlifyIdentity.init();
      }

      // Initialiser quand le DOM est prêt
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initializeNetlifyIdentity);
      } else {
        initializeNetlifyIdentity();
      }

      // Timeout fallback
      setTimeout(function () {
        if (!window.__decapCmsLoaded && !window.netlifyIdentity && !isAuthFlow) {
          loadCms();
        }
      }, 5000);
    })();
  </script>
</body>
</html>
