<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Administration du site</title>
  <!-- Netlify Identity nécessaire pour l'authentification -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script>
    (function () {
      // Attendre que le widget Netlify Identity soit chargé
      if (window.netlifyIdentity) {
        // Initialiser l'authentification Netlify
        window.netlifyIdentity.init();
        
        // Écouter l'initialisation
        window.netlifyIdentity.on('init', function (user) {
          // Charger Decap CMS
          loadCms();
          
          // Si pas d'utilisateur connecté et URL contient token, ouvrir le widget
          if (!user) {
            window.netlifyIdentity.open();
          }
        });

        // Rediriger après connexion
        window.netlifyIdentity.on('login', function () {
          window.location.href = '/admin/';
        });

        // Rediriger après déconnexion
        window.netlifyIdentity.on('logout', function () {
          window.location.href = '/admin/';
        });
      } else {
        // Fallback si Identity n'est pas disponible
        loadCms();
      }

      function loadCms() {
        if (window.__decapCmsLoaded) return;
        window.__decapCmsLoaded = true;

        var script = document.createElement('script');
        script.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
        document.body.appendChild(script);
      }

      // Fallback timeout si Identity n'est jamais disponible
      setTimeout(function () {
        if (!window.__decapCmsLoaded && !window.netlifyIdentity) {
          loadCms();
        }
      }, 5000);
    })();
  </script>
</body>
</html>
