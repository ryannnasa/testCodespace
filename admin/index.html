<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Administration du site</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script>
    (function () {
      // Vérifier si on a un token d'invitation/recovery dans le hash
      var hasInviteToken = /#invite_token=/.test(window.location.hash);
      var hasRecoveryToken = /#recovery_token=/.test(window.location.hash);
      var isAuthFlow = hasInviteToken || hasRecoveryToken;
      
      function loadCms() {
        if (window.__decapCmsLoaded) return;
        window.__decapCmsLoaded = true;

        var script = document.createElement('script');
        script.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
        document.body.appendChild(script);
      }

      function openAuthWidget() {
        // Attendre que le widget soit disponible
        if (!window.netlifyIdentity) {
          setTimeout(openAuthWidget, 100);
          return;
        }
        
        if (hasInviteToken) {
          window.netlifyIdentity.open('signup');
        } else if (hasRecoveryToken) {
          window.netlifyIdentity.open('recovery');
        }
      }

      function initializeNetlifyIdentity() {
        // Attendre que window.netlifyIdentity soit disponible
        var retries = 0;
        var maxRetries = 50; // 5 secondes max
        
        function checkAndInit() {
          if (!window.netlifyIdentity) {
            if (retries < maxRetries) {
              retries++;
              setTimeout(checkAndInit, 100);
            } else {
              console.error('Netlify Identity widget failed to load');
              // Fallback: ouvrir quand même CMS
              loadCms();
            }
            return;
          }

          // Le widget est maintenant disponible
          window.netlifyIdentity.on('init', function (user) {
            if (isAuthFlow) {
              // Pour un flux d'invitation, toujours ouvrir le widget d'inscription
              // Ne pas déconnecter - laisser le widget gérer ça
              openAuthWidget();
            } else {
              // Flux normal - si pas d'utilisateur, ouvrir login
              if (!user) {
                window.netlifyIdentity.open('login');
              } else {
                loadCms();
              }
            }
          });

          window.netlifyIdentity.on('login', function (user) {
            loadCms();
          });

          window.netlifyIdentity.on('logout', function () {
            if (isAuthFlow) {
              // Rester sur la page d'invitation/recovery
              openAuthWidget();
            } else {
              window.location.href = '/admin/';
            }
          });

          // Initialiser Netlify Identity
          window.netlifyIdentity.init();
        }

        checkAndInit();
      }

      // Initialiser quand le DOM est prêt
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initializeNetlifyIdentity);
      } else {
        initializeNetlifyIdentity();
      }
    })();
  </script>
</body>
</html>
